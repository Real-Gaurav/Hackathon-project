<!DOCTYPE html>
<html>
<head>

<title>NGO Verification</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="verify-card">

<h2>NGO Staff Verification</h2>

<p id="result"></p>

</div>

<script>

const params=new URLSearchParams(window.location.search);

let name=params.get("name");
let role=params.get("role");
let ngo=params.get("ngo");

if(name && role && ngo){

document.getElementById("result").innerHTML=

"<b>Name:</b> "+decodeURIComponent(name)+"<br>"+
"<b>Role:</b> "+decodeURIComponent(role)+"<br>"+
"<b>NGO:</b> "+decodeURIComponent(ngo)+"<br><br>"+
"<span class='verified'>✔ VERIFIED STAFF</span>";

}

else{

document.getElementById("result").innerHTML=
"<span class='invalid'>Invalid ID</span>";

}

</script>

</body>
</html>
