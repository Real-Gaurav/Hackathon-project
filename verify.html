<script>

const params = new URLSearchParams(window.location.search);

let name = params.get("name");
let role = params.get("role");
let ngo = params.get("ngo");

if(name && role && ngo){

document.getElementById("result").innerHTML =
"<b>Name:</b> " + decodeURIComponent(name) + "<br>" +
"<b>Role:</b> " + decodeURIComponent(role) + "<br>" +
"<b>NGO:</b> " + decodeURIComponent(ngo) + "<br><br>" +
"<h3 style='color:green'>✔ VERIFIED STAFF</h3>";

}
else{

document.getElementById("result").innerHTML =
"<h3 style='color:red'>Invalid ID</h3>";

}

</script>

</body>
